{% extends "auctions/layout.html" %}

{% block body %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card shadow-sm">
                <div class="card-header bg-white text-center">
                    <h2 class="card-title mb-0 font-weight-bold">Login</h2>
                </div>
                <div class="card-body">
                    
                    <!-- Error message-->
                    {% if message %}
                        <div class="alert alert-danger text-center mb-3" role="alert">
                             {{ message }}
                        </div>
                    {% endif %} 

                      <!-- form user credentials -->
                    <form action="{% url 'login' %}" method="post">
                        {% csrf_token %}
                        <div class="form-group">
                            <input autofocus class="form-control" type="text" name="username" placeholder="Username" required>
                        </div>
                        <div class="form-group">
                             <input class="form-control" type="password" name="password" placeholder="Password" required>
                        </div>
                        <button class="btn btn-primary btn-block mt-3" type="submit">Login</button>
                    </form>

                    <hr class="my-4">
                    <p class="text-center text-muted mb-0">
                        Don't have an account? <a href="{% url 'register' %}" class="font-weight-medium">Register here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
