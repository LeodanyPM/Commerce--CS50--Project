{% extends "auctions/layout.html" %}

{% block body %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm">
                <div class="card-header bg-white text-center">
                    <h2 class="card-title mb-0 fw-bold">Create Account</h2>
                </div>
                <div class="card-body">
                    
                    <!-- Error message  -->
                    {% if message %}
                        <div class="alert alert-danger text-center mb-0" role="alert">
                            {{ message }}
                        </div>
                    {% endif %}
                    <!-- form user info -->
                    <form action="{% url 'register' %}" method="post">
                        {% csrf_token %}
                        <div class="mb-0">
                            <input autofocus class="form-control" type="text" name="username" placeholder="Username" required>
                        </div>
                        <div class="mb-0">
                             <input class="form-control" type="email" name="email" placeholder="Email Address">
                        </div>
                        <div class="mb-0">
                            <input class="form-control" type="password" name="password" placeholder="Password" required>
                        </div>
                        <div class="mb-0 ">
                             <input class="form-control" type="password" name="confirmation" placeholder="Confirm Password" required>
                        </div>
                        <button class="btn btn-primary w-100 mt-4" type="submit">Register</button>
                    </form>

                    <hr class="my-4">
                    <p class="text-center text-muted mb-0">
                         Already have an account? <a href="{% url 'login' %}" class="fw-normal">Log In here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
